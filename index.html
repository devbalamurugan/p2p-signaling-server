<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P2P Chat + Call (PeerJS)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; max-width: 640px; margin: 0 auto; padding: 16px; background:#0f172a; color:#e2e8f0; }
  h1 { font-size: 20px; }
  h2 { font-size: 15px; color:#94a3b8; margin-top: 24px; }
  input[type=text] { width:100%; padding:10px; border-radius:8px; border:1px solid #334155; background:#1e293b; color:#e2e8f0; font-size:14px; }
  button.action { width:100%; padding:12px; margin:6px 0; border:none; border-radius:8px; background:#22c55e; color:white; font-weight:600; cursor:pointer; font-size:14px; }
  button.secondary { background:#3b82f6; }
  button.ghost { background:#334155; color:#e2e8f0; }
  button.danger { background:#ef4444; }
  .row2 { display:flex; gap:8px; }
  .row2 button { flex:1; }
  #status { padding:10px; background:#1e293b; border-radius:8px; font-size:13px; margin:12px 0; display:flex; align-items:center; gap:8px; }
  .dot { width:8px; height:8px; border-radius:50%; background:#64748b; flex-shrink:0; }
  .dot.live { background:#22c55e; box-shadow:0 0 6px #22c55e; }
  .dot.busy { background:#eab308; }
  #myIdBox { background:#1e293b; border-radius:8px; padding:12px; margin:12px 0; text-align:center; }
  #myIdBox .id { font-size:22px; font-weight:700; color:#4ade80; letter-spacing:1px; margin:6px 0; word-break:break-all; }
  #chat { height:220px; overflow-y:auto; background:#1e293b; border-radius:8px; padding:10px; margin-bottom:8px; font-size:14px; }
  .msg-me, .msg-them { max-width:80%; margin:4px 0; padding:6px 10px; border-radius:10px; clear:both; }
  .msg-me { background:#166534; float:right; text-align:right; }
  .msg-them { background:#1d4ed8; float:left; text-align:left; }
  .msg-me img, .msg-them img { max-width:100%; border-radius:8px; display:block; margin-top:4px; }
  .msg-time { font-size:10px; opacity:0.6; display:block; margin-top:2px; }
  .chatrow { display:flex; gap:8px; align-items:center; }
  .chatrow input[type=text] { flex:1; }
  .chatrow button { padding:10px 16px; border:none; border-radius:8px; background:#3b82f6; color:white; }
  .icon-btn { padding:10px 12px; border:none; border-radius:8px; background:#334155; color:#e2e8f0; cursor:pointer; font-size:16px; }
  .note { font-size:12px; color:#94a3b8; margin-top:4px; }
  #transferProgress { font-size:12px; color:#94a3b8; margin:4px 0; display:none; }
  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#22c55e; color:white; padding:10px 20px; border-radius:8px; font-size:13px; opacity:0; transition:opacity 0.3s; pointer-events:none; }
  .toast.show { opacity:1; }
  #chatSection { display:none; }
  #callBar { display:none; background:#1e293b; border-radius:8px; padding:14px; margin-bottom:10px; text-align:center; }
  #callBar.ringing { background:#78350f; }
  #callBar .call-status { font-size:14px; margin-bottom:8px; }
  .call-btn-row { display:flex; gap:8px; justify-content:center; }
  .call-btn { width:52px; height:52px; border-radius:50%; border:none; font-size:20px; cursor:pointer; }
</style>
</head>
<body>

<h1>🔗 P2P Chat + Call</h1>
<div id="status"><span class="dot" id="statusDot"></span><span id="statusText">not online yet</span></div>

<h2>1. Go online with your own ID</h2>
<input type="text" id="myIdInput" placeholder="Choose your ID e.g. bala2026">
<button class="action" onclick="goOnline()">Go Online</button>
<div id="myIdBox" style="display:none;">
  Your permanent ID (share this once, like a phone number):
  <div class="id" id="myIdDisplay"></div>
  <button class="ghost" onclick="copyMyId()">📋 Copy My ID</button>
</div>

<h2>2. Connect to someone</h2>
<input type="text" id="friendIdInput" placeholder="Enter their ID">
<button class="action secondary" onclick="connectToFriend()">Connect</button>
<p class="note">Use the same ID every time you go online — anyone can reach you with it, anytime you're online, from any network.</p>

<div id="chatSection">
  <div id="callBar">
    <div class="call-status" id="callStatus">Idle</div>
    <div class="call-btn-row" id="callControlsIdle">
      <button class="call-btn" style="background:#22c55e;" onclick="startCall()">📞</button>
    </div>
    <div class="call-btn-row" id="callControlsRinging" style="display:none;">
      <button class="call-btn" style="background:#22c55e;" onclick="acceptCall()">✅</button>
      <button class="call-btn" style="background:#ef4444;" onclick="rejectCall()">❌</button>
    </div>
    <div class="call-btn-row" id="callControlsActive" style="display:none;">
      <button class="call-btn" id="muteBtn" style="background:#334155;" onclick="toggleMute()">🎙️</button>
      <button class="call-btn" style="background:#ef4444;" onclick="endCall()">📵</button>
    </div>
  </div>
  <audio id="remoteAudio" autoplay></audio>

  <h2>💬 Chat</h2>
  <div id="chat"></div>
  <div id="transferProgress"></div>
  <div class="chatrow">
    <button class="icon-btn" onclick="document.getElementById('imgPicker').click()">📷</button>
    <input type="file" id="imgPicker" accept="image/*" style="display:none" onchange="sendImage(this.files[0])">
    <input type="text" id="msgInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMsg()">
    <button onclick="sendMsg()">Send</button>
  </div>
  <button class="action danger" style="margin-top:12px;" onclick="disconnectPeer()">🔌 Disconnect</button>
</div>

<div class="toast" id="toast"></div>

<script>
let peer, conn, activeCall, localStream, muted = false;
const incomingFiles = {};

function setStatus(text, mode) {
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusDot').className = 'dot' + (mode ? ' ' + mode : '');
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}
function copyMyId() {
  navigator.clipboard.writeText(peer.id).then(() => toast('Copied ✅'));
}

// --- Go online ---
function goOnline() {
  const wanted = document.getElementById('myIdInput').value.trim();
  if (!wanted) return toast('Choose an ID first');
  setStatus('connecting to signaling server...', 'busy');

  peer = new Peer(wanted, {
    debug: 1,
    config: {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
        { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
        { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
      ]
    }
  });

  peer.on('open', id => {
    setStatus('online — waiting for connection', 'live');
    document.getElementById('myIdBox').style.display = 'block';
    document.getElementById('myIdDisplay').textContent = id;
  });

  peer.on('connection', c => {
    conn = c;
    setupConnEvents();
    toast('Incoming connection...');
  });

  // Incoming CALL (separate from data connection)
  peer.on('call', call => {
    activeCall = call;
    showCallBar('ringing', 'Incoming call from ' + call.peer + '...');
  });

  peer.on('error', err => {
    if (err.type === 'unavailable-id') {
      toast('That ID is taken right now — try another');
    } else {
      toast('Error: ' + err.type);
    }
    setStatus('error ❌', '');
  });

  peer.on('disconnected', () => setStatus('disconnected from signaling server', ''));
}

// --- Connect to a friend by their ID (for chat) ---
function connectToFriend() {
  if (!peer || peer.disconnected) return toast('Go online first');
  const friendId = document.getElementById('friendIdInput').value.trim();
  if (!friendId) return toast('Enter their ID');
  setStatus('connecting to ' + friendId + '...', 'busy');
  conn = peer.connect(friendId, { reliable: true });
  setupConnEvents();
}

function setupConnEvents() {
  const stuckTimer = setTimeout(() => {
    if (!conn.open) {
      setStatus('connection failed ❌ — check both devices are online, try again', '');
      toast('Could not connect — try again');
    }
  }, 15000);

  conn.on('open', () => {
    clearTimeout(stuckTimer);
    setStatus('connected ✅ (' + conn.peer + ')', 'live');
    document.getElementById('chatSection').style.display = 'block';
    showCallBar('idle', 'Ready to call ' + conn.peer);
  });
  conn.on('data', data => handleIncoming(data));
  conn.on('close', () => setStatus('peer disconnected', ''));
  conn.on('error', () => { clearTimeout(stuckTimer); setStatus('connection error ⚠️', ''); });
}

function disconnectPeer() {
  if (conn) conn.close();
  endCall();
  document.getElementById('chatSection').style.display = 'none';
  document.getElementById('chat').innerHTML = '';
  setStatus('online — waiting for connection', 'live');
}

// ---------------- CALL LOGIC ----------------
function showCallBar(state, statusText) {
  const bar = document.getElementById('callBar');
  bar.style.display = 'block';
  bar.className = state === 'ringing' ? 'ringing' : '';
  document.getElementById('callStatus').textContent = statusText;
  document.getElementById('callControlsIdle').style.display = state === 'idle' ? 'flex' : 'none';
  document.getElementById('callControlsRinging').style.display = state === 'ringing' ? 'flex' : 'none';
  document.getElementById('callControlsActive').style.display = state === 'active' ? 'flex' : 'none';
}

async function getMic() {
  try {
    return await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch (e) {
    toast('Microphone permission denied');
    throw e;
  }
}

async function startCall() {
  if (!conn) return toast('Connect to someone first');
  try {
    localStream = await getMic();
  } catch (e) { return; }
  activeCall = peer.call(conn.peer, localStream);
  showCallBar('active', 'Calling ' + conn.peer + '...');
  wireCallEvents();
}

async function acceptCall() {
  try {
    localStream = await getMic();
  } catch (e) { rejectCall(); return; }
  activeCall.answer(localStream);
  showCallBar('active', 'In call with ' + activeCall.peer);
  wireCallEvents();
}

function rejectCall() {
  if (activeCall) activeCall.close();
  activeCall = null;
  showCallBar('idle', 'Ready to call');
}

function wireCallEvents() {
  activeCall.on('stream', remoteStream => {
    document.getElementById('remoteAudio').srcObject = remoteStream;
    showCallBar('active', 'In call with ' + activeCall.peer);
  });
  activeCall.on('close', () => {
    showCallBar('idle', 'Call ended');
    stopLocalStream();
  });
  activeCall.on('error', () => {
    toast('Call error');
    endCall();
  });
}

function endCall() {
  if (activeCall) activeCall.close();
  activeCall = null;
  stopLocalStream();
  showCallBar('idle', 'Ready to call' + (conn ? ' ' + conn.peer : ''));
}

function stopLocalStream() {
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }
  muted = false;
  document.getElementById('muteBtn').textContent = '🎙️';
}

function toggleMute() {
  if (!localStream) return;
  muted = !muted;
  localStream.getAudioTracks().forEach(t => t.enabled = !muted);
  document.getElementById('muteBtn').textContent = muted ? '🔇' : '🎙️';
}

// ---------------- CHAT ----------------
function addMsg(text, mine) {
  const div = document.createElement('div');
  div.className = mine ? 'msg-me' : 'msg-them';
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  div.innerHTML = escapeHtml(text) + '<span class="msg-time">' + time + '</span>';
  document.getElementById('chat').appendChild(div);
  document.getElementById('chat').scrollTop = 1e9;
}
function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
function sendMsg() {
  const input = document.getElementById('msgInput');
  if (!input.value || !conn || !conn.open) return toast('Not connected yet');
  conn.send({ t: 'text', v: input.value });
  addMsg(input.value, true);
  input.value = '';
}

// ---------------- IMAGES ----------------
function handleIncoming(data) {
  if (data && data.t === 'text') {
    addMsg(data.v, false);
  } else if (data && data.t === 'img-start') {
    incomingFiles[data.id] = { chunks: [], mime: data.mime, expected: data.chunks };
    showProgress('Receiving image... 0%');
  } else if (data && data.t === 'img-end') {
    const f = incomingFiles[data.id];
    if (!f) return;
    const blob = new Blob(f.chunks, { type: f.mime });
    addImageMsg(URL.createObjectURL(blob), false);
    delete incomingFiles[data.id];
    hideProgress();
  } else {
    const ids = Object.keys(incomingFiles);
    if (!ids.length) return;
    const f = incomingFiles[ids[ids.length - 1]];
    f.chunks.push(data);
    showProgress('Receiving image... ' + Math.round((f.chunks.length / f.expected) * 100) + '%');
  }
}
function showProgress(text) {
  const el = document.getElementById('transferProgress');
  el.style.display = 'block';
  el.textContent = text;
}
function hideProgress() {
  document.getElementById('transferProgress').style.display = 'none';
}
function addImageMsg(url, mine) {
  const div = document.createElement('div');
  div.className = mine ? 'msg-me' : 'msg-them';
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  div.innerHTML = '<img src="' + url + '"><span class="msg-time">' + time + '</span>';
  document.getElementById('chat').appendChild(div);
  document.getElementById('chat').scrollTop = 1e9;
}
async function sendImage(file) {
  if (!file || !conn || !conn.open) return toast('Not connected yet');
  const CHUNK_SIZE = 16 * 1024;
  const buf = await file.arrayBuffer();
  const totalChunks = Math.ceil(buf.byteLength / CHUNK_SIZE);
  const id = Date.now().toString();

  conn.send({ t: 'img-start', id, mime: file.type, chunks: totalChunks });
  for (let i = 0; i < totalChunks; i++) {
    const chunk = new Uint8Array(buf.slice(i * CHUNK_SIZE, (i + 1) * CHUNK_SIZE));
    conn.send(chunk);
    showProgress('Sending image... ' + Math.round(((i + 1) / totalChunks) * 100) + '%');
    await new Promise(r => setTimeout(r, 10));
  }
  conn.send({ t: 'img-end', id });
  addImageMsg(URL.createObjectURL(file), true);
  hideProgress();
  document.getElementById('imgPicker').value = '';
}
</script>
</body>
</html>
