<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure P2P Private Chat</title>
    <!-- Frontend P2P Tracker Library Loading -->
    <script src="https://jsdelivr.net"></script>
</head>
<body>

    <h2>Pure P2P Private Chat (Direct Target Message)</h2>
    
    <!-- User Login Section -->
    <div id="login-box">
        <input type="text" id="username" placeholder="Enter Your Username">
        <button onclick="startP2PConnection()">Open App & Connect</button>
    </div>

    <!-- Chat Box Section (Hidden initially) -->
    <div id="chat-box" style="display:none; margin-top: 20px;">
        <p>Status: <b id="status" style="color: orange;">Connecting to Public Trackers...</b></p>
        
        <!-- Private Target Selection Fields -->
        <div style="margin-bottom: 10px; padding: 10px; background: #f0f0f0; border-radius: 5px;">
            <label><b>Send To (Target Username):</b></label><br>
            <input type="text" id="target-username" placeholder="Type friend's exact username...">
        </div>

        <div id="messages" style="border:1px solid #ccc; height:200px; overflow-y:scroll; padding:10px; margin-bottom:10px;"></div>
        
        <input type="text" id="msg-input" placeholder="Type secret private message...">
        <button onclick="sendPrivateMessage()">Send Private Message</button>
    </div>

    <script>
        let p2p;
        let myUsername = "";

        // 1. Setup Public Trackers Array
        const trackers = [
            'wss://://openwebtorrent.com',
            'wss://tracker.webtorrent.dev',
            'wss://tracker.files.fm:7073/announce'
        ];

        function startP2PConnection() {
            myUsername = document.getElementById('username').value.trim();
            if (!myUsername) return alert("Please enter a username!");

            document.getElementById('login-box').style.display = 'none';
            document.getElementById('chat-box').style.display = 'block';

            // Global Filter App ID
            p2p = new P2PT(trackers, 'my-secret-p2p-image-sharing-app-2026');

            // 2. Peer Connect Hook up
            p2p.on('peerconnect', (peer) => {
                document.getElementById('status').innerText = "Connected to Tracking Node Network!";
                document.getElementById('status').style.color = "green";
                
                // Connection aanathum, namaloda real username-ah antha peer-ku identity identity mapping-kaga anupuvom
                peer.send(JSON.stringify({ type: 'intro', from: myUsername }));
            });

            // 3. Handling Incoming Messages Direct from Specific User
            p2p.on('msg', (peer, msg) => {
                const data = JSON.parse(msg);
                
                if (data.type === 'intro') {
                    // RAM structure mapping: Intha peer connection object-la friend-oda username-ah lock panrom
                    peer.customUsername = data.from; 
                    logMessage(`System: User '${data.from}' is online and discovery ready.`);
                } 
                else if (data.type === 'private-chat') {
                    // Unga username-ku vantha message-ah nu check panra logic
                    if (data.to === myUsername) {
                        logMessage(`[Private] ${data.from}: ${data.text}`);
                    }
                }
            });

            p2p.on('peerdisconnect', (peer) => {
                logMessage(`System: '${peer.customUsername || 'A user'}' disconnected.`);
            });

            p2p.start();
        }

        // 4. Core Logic: Send Message to ONE SPECIFIC USER
        function sendPrivateMessage() {
            const targetInput = document.getElementById('target-username');
            const targetUser = targetInput.value.trim();
            
            const msgInput = document.getElementById('msg-input');
            const text = msgInput.value.trim();

            if (!targetUser) return alert("Please enter the Target Username first!");
            if (!text) return;

            let userFoundInNetwork = false;

            // Structure checking: Loop through all active local peers in RAM
            p2p.peers.forEach((peersList) => {
                peersList.forEach((peer) => {
                    // Match found: Check if the peer's username matches the target user input
                    if (peer.customUsername === targetUser) {
                        userFoundInNetwork = true;
                        
                        const packet = JSON.stringify({ 
                            type: 'private-chat', 
                            from: myUsername, 
                            to: targetUser, 
                            text: text 
                        });
                        
                        // Straight-ah antha peer-ku mattum direct execution lines send aagum (No broadcasting!)
                        peer.send(packet);
                    }
                });
            });

            if (userFoundInNetwork) {
                logMessage(`You (to ${targetUser}): ${text}`);
                msgInput.value = ''; // Input box clean up
            } else {
                alert(`Error: User '${targetUser}' is not found in your tracker network loop!`);
            }
        }

        function logMessage(msg) {
            const msgDiv = document.getElementById('messages');
            msgDiv.innerHTML += `<div>${msg}</div>`;
            msgDiv.scrollTop = msgDiv.scrollHeight;
        }
    </script>
</body>
</html>
