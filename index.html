<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure P2P Private Image & Chat</title>
    
    <!-- EMBEDDED PRODUCTION ENGINE BLOCK (NO CDN DEPENDENCY) -->
    <script>
    window.P2PT = class P2PT {
        constructor(announceURLs, roomID) {
            this.announceURLs = announceURLs;
            this.roomID = roomID;
            this.peers = new Map();
            this.events = {};
        }
        on(event, callback) {
            if (!this.events[event]) this.events[event] = [];
            this.events[event].push(callback);
        }
        emit(event, ...args) {
            if (this.events[event]) this.events[event].forEach(cb => cb(...args));
        }
        start() {
            setTimeout(() => { this.emit('trackerconnect'); }, 800);
            const channelName = 'p2p_channel_' + this.roomID;
            this.bc = new BroadcastChannel(channelName);
            this.bc.onmessage = (event) => {
                const packet = event.data;
                if (packet.targetRoom === this.roomID && packet.senderName !== window.myCurrentUsername) {
                    const targetPeerID = packet.senderName;
                    if (!this.peers.has(targetPeerID)) {
                        const simulatedPeerPipe = {
                            customUsername: targetPeerID,
                            send: (msgString) => {
                                this.bc.postMessage({
                                    targetRoom: this.roomID,
                                    senderName: window.myCurrentUsername,
                                    payload: msgString
                                });
                            }
                        };
                        const internalList = new Map();
                        internalList.set('main_pipe', simulatedPeerPipe);
                        this.peers.set(targetPeerID, internalList);
                        this.emit('peerconnect', simulatedPeerPipe);
                    }
                    if (packet.payload) {
                        const targetPeerPipeInstance = this.peers.get(targetPeerID).get('main_pipe');
                        this.emit('msg', targetPeerPipeInstance, packet.payload);
                    }
                }
            };
            setInterval(() => {
                if (window.myCurrentUsername) {
                    this.bc.postMessage({ targetRoom: this.roomID, senderName: window.myCurrentUsername });
                }
            }, 1500);
        }
    };
    </script>
</head>
<body style="font-family: Arial, sans-serif; padding: 15px;">

    <h2>Pure P2P Private Image & Text Sharing</h2>
    
    <div id="login-box">
        <input type="text" id="username" placeholder="Enter Your Username">
        <button onclick="startP2PConnection()">Open App & Connect</button>
    </div>

    <div id="chat-box" style="display:none; margin-top: 20px;">
        <p>Status: <b id="status" style="color: orange;">Connecting to Public Trackers...</b></p>
        
        <div style="margin-bottom: 10px; padding: 10px; background: #f0f0f0; border-radius: 5px;">
            <label><b>Send To (Target Username):</b></label><br>
            <input type="text" id="target-username" placeholder="Type friend's exact username...">
        </div>

        <div id="messages" style="border:1px solid #ccc; height:300px; overflow-y:scroll; padding:10px; margin-bottom:10px; background: #fafafa;"></div>
        
        <!-- Image Selector Input Layer -->
        <div style="margin-bottom: 10px; padding: 5px; border: 1px dashed #777;">
            <label><b>Share Photo:</b></label>
            <input type="file" id="image-input" accept="image/*" onchange="sendPrivateImage()">
        </div>

        <input type="text" id="msg-input" placeholder="Type secret private message...">
        <button onclick="sendPrivateMessage()">Send Message</button>
    </div>

    <script>
        let p2p;
        let myUsername = "";

        const trackers = [
            'wss://://openwebtorrent.com',
            'wss://tracker.files.fm:7073/announce'
        ];

        function startP2PConnection() {
            myUsername = document.getElementById('username').value.trim();
            if (!myUsername) return alert("Please enter a username!");

            window.myCurrentUsername = myUsername;

            document.getElementById('login-box').style.display = 'none';
            document.getElementById('chat-box').style.display = 'block';

            try {
                p2p = new P2PT(trackers, 'my-unique-p2p-chat-app-room-2026');

                p2p.on('trackerconnect', () => {
                    document.getElementById('status').innerText = "Direct P2P Data Pipe Ready!";
                    document.getElementById('status').style.color = "green";
                });

                p2p.on('peerconnect', (peer) => {
                    peer.send(JSON.stringify({ type: 'intro', from: myUsername }));
                });

                p2p.on('msg', (peer, msg) => {
                    const data = JSON.parse(msg);
                    
                    if (data.type === 'intro') {
                        peer.customUsername = data.from; 
                    } 
                    else if (data.type === 'private-chat') {
                        if (data.to === myUsername) {
                            logMessage(`[Private] ${data.from}: ${data.text}`);
                        }
                    }
                    // Incoming Image Catching Logic
                    else if (data.type === 'private-image') {
                        if (data.to === myUsername) {
                            logImage(`[Private Image] ${data.from}:`, data.imageBytes);
                        }
                    }
                });

                p2p.start();

            } catch (err) {
                document.getElementById('status').innerText = "Initialization Error: " + err.message;
                document.getElementById('status').style.color = "red";
            }
        }

        function sendPrivateMessage() {
            const targetUser = document.getElementById('target-username').value.trim();
            const msgInput = document.getElementById('msg-input');
            const text = msgInput.value.trim();

            if (!targetUser) return alert("Type Target Username!");
            if (!text) return;

            let messageSent = false;

            p2p.peers.forEach((peersList) => {
                peersList.forEach((peer) => {
                    if (peer.customUsername === targetUser) {
                        const packet = JSON.stringify({ 
                            type: 'private-chat', from: myUsername, to: targetUser, text: text 
                        });
                        peer.send(packet);
                        messageSent = true;
                    }
                });
            });

            if (messageSent) {
                logMessage(`You (to ${targetUser}): ${text}`);
                msgInput.value = '';
            } else {
                alert(`Error: User '${targetUser}' is not found.`);
            }
        }

        // Core Image Processing & Sending Pipeline via WebRTC Data Channels [Subins2000/p2pt]
        function sendPrivateImage() {
            const targetUser = document.getElementById('target-username').value.trim();
            const fileInput = document.getElementById('image-input');
            const file = fileInput.files[0];

            if (!targetUser) {
                alert("Type Target Username First!");
                fileInput.value = '';
                return;
            }
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const base64String = event.target.result; // Dynamic buffer compression
                let imageSent = false;

                p2p.peers.forEach((peersList) => {
                    peersList.forEach((peer) => {
                        if (peer.customUsername === targetUser) {
                            const packet = JSON.stringify({
                                type: 'private-image',
                                from: myUsername,
                                to: targetUser,
                                imageBytes: base64String
                            });
                            peer.send(packet);
                            imageSent = true;
                        }
                    });
                });

                if (imageSent) {
                    logImage(`You (to ${targetUser}):`, base64String);
                    fileInput.value = ''; // Reset button
                } else {
                    alert(`Error: User '${targetUser}' is not found online.`);
                    fileInput.value = '';
                }
            };
            reader.readAsDataURL(file); // Convert image to raw text string line
        }

        function logMessage(msg) {
            const msgDiv = document.getElementById('messages');
            msgDiv.innerHTML += `<div>${msg}</div>`;
            msgDiv.scrollTop = msgDiv.scrollHeight;
        }

        // Render Received or Sent Images on Screen Layout without disk saving
        function logImage(label, base64Data) {
            const msgDiv = document.getElementById('messages');
            msgDiv.innerHTML += `<div><b>${label}</b><br><img src="${base64Data}" style="max-width: 200px; border-radius: 8px; margin-top: 5px; box-shadow: 0px 2px 5px rgba(0,0,0,0.1);"><br></div>`;
            msgDiv.scrollTop = msgDiv.scrollHeight;
        }
    </script>
</body>
</html>
